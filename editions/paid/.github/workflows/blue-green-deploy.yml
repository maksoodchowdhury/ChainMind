name: Blue Green Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production

jobs:
  blue-green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy green slot
        run: |
          echo "Deploying green slot for ${{ github.event.inputs.environment }}"
      - name: Smoke test green slot
        run: |
          echo "Run smoke tests against green slot"
      - name: Switch traffic to green
        run: |
          echo "Promoting green to active"
      - name: Rollback on failure
        if: failure()
        run: |
          ./scripts/rollback.sh HEAD~1
