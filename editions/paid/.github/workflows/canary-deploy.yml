name: Canary Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
      canary_percent:
        description: Traffic percentage for canary
        required: true
        default: '10'

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Canary deployment placeholder
        run: |
          echo "Deploying canary to ${{ github.event.inputs.environment }}"
          echo "Traffic split: ${{ github.event.inputs.canary_percent }}%"
      - name: Rollback hook
        if: failure()
        run: |
          ./scripts/rollback.sh HEAD~1
