name: CI Community Edition

on:
  pull_request:
    paths:
      - 'editions/community/**'
      - '.github/workflows/ci-community.yml'
  push:
    branches: [ master, main ]
    paths:
      - 'editions/community/**'
      - '.github/workflows/ci-community.yml'

jobs:
  community-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: editions/community
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('punkt_tab')"
      - name: Run community tests
        run: python -m pytest -q ./tests
      - name: Security gate
        run: python scripts/security_gate.py --report security_gate_report.json
      - name: Quality gate (best-effort)
        run: |
          if [ -f data/quality_current.json ] && [ -f data/quality_baseline.json ]; then
            python scripts/quality_gate.py --current data/quality_current.json --baseline data/quality_baseline.json
          else
            echo "Quality artifacts missing; skipping strict quality gate in this run."
          fi
