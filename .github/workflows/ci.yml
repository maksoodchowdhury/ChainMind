name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('punkt_tab')"
      - name: Run tests
        run: python -m pytest -q ./tests
      - name: Security gate
        run: python scripts/security_gate.py --report security_gate_report.json
      - name: Quality gate (best-effort)
        run: |
          if [ -f data/quality_current.json ] && [ -f data/quality_baseline.json ]; then
            python scripts/quality_gate.py --current data/quality_current.json --baseline data/quality_baseline.json
          else
            echo "Quality artifacts missing; skipping strict quality gate in this run."
          fi
